name: Regression Tests

on:
  schedule:
    # 每天 02:00 (Asia/Shanghai) ≈ 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      grep:
        description: '测试范围'
        required: false
        default: regression
        type: choice
        options:
          - regression
          - smoke
          - all

concurrency:
  group: regression-tests
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regression:
    name: 定时回归测试
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/playwright-setup

      - name: Run regression tests
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://mail.711621.xyz/' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin' }}
          TEST_ENV: ci-regression
          REGRESSION_SCOPE: ${{ github.event.inputs.grep || 'regression' }}
        run: |
          case "$REGRESSION_SCOPE" in
            smoke) npm run test:smoke ;;
            all) npm run test:ci ;;
            *) npm run test:ci:regression ;;
          esac

      - name: Copy test data into dashboard/public
        if: always()
        run: |
          mkdir -p dashboard/public/runs
          if ls reports/runs/*.json 2>/dev/null; then
            cp reports/runs/*.json dashboard/public/runs/
          fi
          if [ -d playwright-report ]; then
            cp -r playwright-report dashboard/public/
          fi

      - name: Build dashboard
        if: always()
        run: npm run dashboard:build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload run JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-runs
          path: reports/runs/
          retention-days: 30

  deploy-cloudflare:
    name: 更新 Cloudflare Pages（回归结果）
    needs: regression
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/playwright-setup

      - name: Download regression run JSON
        uses: actions/download-artifact@v4
        with:
          name: regression-reports-runs
          path: reports/runs

      - name: Download regression Playwright report
        uses: actions/download-artifact@v4
        with:
          name: regression-playwright-report
          path: playwright-report

      - name: Copy data into dashboard/public
        run: |
          mkdir -p dashboard/public/runs
          if ls reports/runs/*.json 2>/dev/null; then
            cp reports/runs/*.json dashboard/public/runs/
          fi
          if [ -d playwright-report ]; then
            cp -r playwright-report dashboard/public/
          fi

      - name: Build dashboard
        run: npm run dashboard:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=playwright-test --commit-dirty=true
