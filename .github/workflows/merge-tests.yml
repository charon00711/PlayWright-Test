name: Merge Tests

on:
  push:
    branches: [main, master]

concurrency:
  group: merge-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-test:
    name: Merge 全量测试
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/playwright-setup

      - name: Run full E2E suite
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://wellcoin.711621.xyz/' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin' }}
          TEST_ENV: ci-merge
        run: npm run test:ci

      - name: Run Web Vitals performance tests
        if: always()
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://wellcoin.711621.xyz/' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin' }}
          TEST_ENV: ci-merge
        run: npm run test:perf || true

      - name: Install k6
        if: always()
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run load test
        if: always()
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://wellcoin.711621.xyz/' }}
          TEST_ENV: ci-merge
          VUS: 5
          DURATION: 20s
        run: npm run perf:load || true

      - name: Sync reports (including perf)
        if: always()
        run: node scripts/sync-reports.mjs

      - name: Copy test data into dashboard/public
        if: always()
        run: |
          mkdir -p dashboard/public/runs
          if ls reports/runs/*.json 2>/dev/null; then
            cp reports/runs/*.json dashboard/public/runs/
          fi
          if [ -d playwright-report ]; then
            cp -r playwright-report dashboard/public/
          fi

      - name: Build dashboard
        if: always()
        env:
          VITE_BASE_URL: ${{ secrets.BASE_URL || 'https://wellcoin.711621.xyz/' }}
          VITE_PLATFORM_API_URL: ${{ secrets.PLATFORM_API_URL || '' }}
        run: npm run dashboard:build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload run JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-reports-runs
          path: reports/runs/
          retention-days: 14

      - name: Upload dashboard dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 14

  deploy-cloudflare:
    name: 部署到 Cloudflare Pages
    needs: full-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=playwright-test --commit-dirty=true
