name: Merge Tests

on:
  push:
    branches: [main, master]

concurrency:
  group: merge-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-test:
    name: Merge 全量测试
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/playwright-setup

      - name: Run full E2E suite
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://mail.711621.xyz/' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin' }}
          TEST_ENV: ci-merge
        run: npm run test:ci

      - name: Copy test data into dashboard/public
        if: always()
        run: |
          mkdir -p dashboard/public/runs
          if ls reports/runs/*.json 2>/dev/null; then
            cp reports/runs/*.json dashboard/public/runs/
          fi
          if [ -d playwright-report ]; then
            cp -r playwright-report dashboard/public/
          fi

      - name: Build dashboard
        if: always()
        run: npm run dashboard:build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload run JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-reports-runs
          path: reports/runs/
          retention-days: 14

      - name: Upload dashboard dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 14

  deploy-cloudflare:
    name: 部署到 Cloudflare Pages
    needs: full-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=playwright-test --commit-dirty=true
