<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Playwright测试平台</title>
  <script>
    // GitHub Pages SPA routing: redirect all 404s back to index.html
    // preserving the path as a query param, then index.html restores it.
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/');
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?p=' +
      l.pathname.slice(base.length + 1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
